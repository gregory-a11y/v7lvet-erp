networks:
  erp:
    name: erp
    driver: bridge

services:
  erp-app:
    image: ghcr.io/gregory-a11y/v7lvet-erp:latest
    container_name: erp-app
    restart: unless-stopped
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    networks:
      - erp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
